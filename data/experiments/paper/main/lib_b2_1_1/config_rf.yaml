# Description: Configuration file for lib_a2_unity experiment
loglevel: "INFO"
data_path: ${oc.env:DEL_SIMULATOR_EXPERIMENT_PATH} 
experiment_id: lib_b2_1_1
random_seed: &random_seed 42 #anchors work!
library_generation:
  building_block_path: '${data_path}/library_configs/lib_b/bbs_b2.json'
  reaction_scheme_path: '${data_path}/library_configs/lib_b/lib_1_1.json'
  output_path: ${data_path}/${experiment_id}
  num_cpu: 36
  chunksize: 250
  return_all_products: False 
affinity_generation: 
  input_library_path: "${data_path}/${experiment_id}/library.csv"
  output_path: ${data_path}/${experiment_id}/
  runs: 
    affinity_seh_512:  ${load_yaml:../seh_affinity_params.yaml}
    affinity_ntc:   ${load_yaml:../ntc_affinity_params.yaml}
selection:
  input_library_path: "${data_path}/${experiment_id}/library.csv"
  input_affinity_paths:  
    "ntc": "${data_path}/${experiment_id}/affinity_ntc.csv"
    "seh": "${data_path}/${experiment_id}/affinity_seh_512.csv"
  initial_library_amount_mol: 2.0e-11 # 0.02 nmol = 20 pmol 
  experiment_volume_L: 200.0e-6 #200 uL
  selection_experiments: 
    seh_3_experiment:
      binding_sites: ["ntc","seh"]
      recovery_fractions: [0.8, 0.8]
      binding_site_concentrations_M: [1.e-6, 1.e-6]
      num_selection_rounds: 3
    ntc_3_experiment:
      binding_sites: ["ntc"]
      recovery_fractions: [0.8]
      binding_site_concentrations_M: [1.e-6]
      num_selection_rounds: 3
amplification_readout:
  readout_seed: {{REPLICA}}
  output_path_prefix: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}"
  readout_runs:  ${load_yaml:../readout_runs.yaml}
data_prep:
    runs:
      data_prep_reads_{{NUM_READS}}k:
        intended_product_path: "${data_path}/lib_b2_unity/library.csv"
        target_data_path:  "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/seh_3_experiment.csv"
        ntc_data_path:  "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/ntc_3_experiment.csv"
        output_path:  "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/"
        fp_generator_method: morgan
        fp_generator_method_parameters:
          nBits: 1024
          radius: 2
        bbs_per_nsynthon: 3
        num_bbs_to_aggregate: 2
training_and_inference:
  runs:
    replica_{{REPLICA}}_{{NUM_READS}}k_rf_disynthon:
      input_data_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/processed_data_nsynthon_agg_2.pkl"
      model_output_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/"
      metrics_output_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/metrics_rf_nsynthon_agg_2.json"
      enrichment_method: "count_ratio" 
      enrichment_threshold: 5
      ml_config:
        method: "random_forest" 
        random_seed: 42
        method_parameters:
          n_estimators: 50
          max_depth: 20
      inference:
        featurized_data_path: "${data_path}/inference/2024.01_Enamine_REAL_1.0M_filtered_fingerprints.npy"
        smiles_path: 
        affinity_path: "${data_path}/inference/affinity_seh_512_1.0M_filtered.csv"
        affinity_threshold: 6.75
        affinity_column : pKd_seh
        sample_size: 1000000
        output_predictions_path: 
    replica_{{REPLICA}}_{{NUM_READS}}k_rf:
      input_data_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/processed_data_df.pkl"
      model_output_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/"
      metrics_output_path: "${data_path}/${experiment_id}/replica_${amplification_readout.readout_seed}/readout/reads_{{NUM_READS}}k/metrics_rf.json"
      enrichment_method: "count_ratio" 
      enrichment_threshold: 5
      ml_config:
        method: "random_forest" 
        random_seed: 42
        method_parameters:
          n_estimators: 50
          max_depth: 20
      inference:
        featurized_data_path: "${data_path}/inference/2024.01_Enamine_REAL_1.0M_filtered_fingerprints.npy"
        smiles_path: 
        affinity_path: "${data_path}/inference/affinity_seh_512_1.0M_filtered.csv"
        affinity_threshold: 6.75
        affinity_column : pKd_seh
        sample_size: 1000000
        output_predictions_path: 
